openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: customer
    description: Customer operations
  - name: vendor
    description: Vendor operations
  - name: rider
    description: Rider operations
  - name: admin
    description: Admin operations
  - name: products
    description: Product operations
  - name: analytics
    description: Analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ─────────────────────────────────────────────────────────────────
  /auth/otp/request:
    post:
      operationId: requestOtp
      tags: [auth]
      summary: Request OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOtpBody"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestOtpResponse"

  /auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and get JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  # ─── Public ───────────────────────────────────────────────────────────────
  /vendors/nearby:
    get:
      operationId: getNearbyVendors
      tags: [customer]
      summary: Get nearby vendors
      parameters:
        - name: lat
          in: query
          schema:
            type: number
        - name: lng
          in: query
          schema:
            type: number
        - name: radius
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of nearby vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get products
      parameters:
        - name: vendorId
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /search:
    get:
      operationId: globalSearch
      tags: [customer]
      summary: Global search
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ─── Customer ─────────────────────────────────────────────────────────────
  /orders/mine:
    get:
      operationId: getMyOrders
      tags: [customer]
      summary: Get my orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/place:
    post:
      operationId: placeOrder
      tags: [customer]
      summary: Place an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderBody"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ─── Vendor ───────────────────────────────────────────────────────────────
  /vendors/mine:
    get:
      operationId: getMyVendor
      tags: [vendor]
      summary: Get my vendor profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Vendor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /orders/vendor:
    get:
      operationId: getVendorOrders
      tags: [vendor]
      summary: Get vendor orders
      security:
        - bearerAuth: []
      parameters:
        - name: vendorId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /vendors/{vendorId}/status:
    patch:
      operationId: toggleVendorStatus
      tags: [vendor]
      summary: Toggle vendor open/closed status
      security:
        - bearerAuth: []
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleVendorStatusBody"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /products/{productId}/toggle-stock:
    post:
      operationId: toggleProductStock
      tags: [products]
      summary: Toggle product stock
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleStockBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /orders/{orderId}/advance:
    post:
      operationId: advanceOrderStatus
      tags: [vendor]
      summary: Advance order status
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ─── Rider ────────────────────────────────────────────────────────────────
  /riders/mine:
    get:
      operationId: getMyRider
      tags: [rider]
      summary: Get my rider profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rider profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/mine/status:
    put:
      operationId: updateMyRiderStatus
      tags: [rider]
      summary: Update rider online status
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRiderStatusBody"
      responses:
        "200":
          description: Updated rider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /orders/rider:
    get:
      operationId: getRiderOrders
      tags: [rider]
      summary: Get rider orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{orderId}/complete:
    post:
      operationId: completeOrderDelivery
      tags: [rider]
      summary: Mark order as delivered
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                proofImageUrl:
                  type: string
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ─── Admin ────────────────────────────────────────────────────────────────
  /admin/daily-report:
    get:
      operationId: getAdminDailyReport
      tags: [admin]
      summary: Get daily report
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /admin/vendors:
    get:
      operationId: getAllVendors
      tags: [admin]
      summary: Get all vendors
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of all vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /admin/orders:
    get:
      operationId: getAllOrders
      tags: [admin]
      summary: Get all orders
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of all orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RequestOtpBody:
      type: object
      properties:
        phone:
          type: string
      required:
        - phone

    RequestOtpResponse:
      type: object
      properties:
        message:
          type: string
        devOtp:
          type: string
      required:
        - message

    VerifyOtpBody:
      type: object
      properties:
        phone:
          type: string
        otp:
          type: string
      required:
        - phone
        - otp

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        userId:
          type: string
        role:
          type: string
      required:
        - token
        - userId
        - role

    OrderItem:
      type: object
      properties:
        productId:
          type: string
        name:
          type: string
        quantity:
          type: integer
        pricePaise:
          type: integer
        price:
          type: number

    Order:
      type: object
      properties:
        _id:
          type: string
        currentStatus:
          type: string
        status:
          type: string
        totalAmountPaise:
          type: integer
        totalAmount:
          type: number
        paymentMethod:
          type: string
        customerNote:
          type: string
        createdAt:
          type: string
        deliveryAddress:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        vendorId:
          type: string
        riderId:
          type: string
      required:
        - _id

    Vendor:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        phone:
          type: string
        isOpen:
          type: boolean
        status:
          type: string
        address:
          type: string
        fssaiNumber:
          type: string
        serviceRadiusKm:
          type: number
        createdAt:
          type: string
      required:
        - _id
        - name
        - phone

    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        pricePaise:
          type: integer
        price:
          type: number
        category:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        isOutOfStock:
          type: boolean
        inStock:
          type: boolean
        stockQuantity:
          type: integer
        vendorId:
          type: string
      required:
        - _id
        - name

    Rider:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        phone:
          type: string
        isOnline:
          type: boolean
        vehicleNumber:
          type: string
        createdAt:
          type: string
      required:
        - _id

    StatusCount:
      type: object
      properties:
        _id:
          type: string
        count:
          type: integer

    DailyReport:
      type: object
      properties:
        totalOrders:
          type: integer
        grossRevenuePaise:
          type: integer
        platformFeePaise:
          type: integer
        totalVendors:
          type: integer
        topVendorName:
          type: string
        statusBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
      required:
        - totalOrders
        - grossRevenuePaise
        - platformFeePaise

    OrderTrendPoint:
      type: object
      properties:
        _id:
          type: string
        orders:
          type: integer
        revenuePaise:
          type: integer

    AnalyticsSummary:
      type: object
      properties:
        orderTrend:
          type: array
          items:
            $ref: "#/components/schemas/OrderTrendPoint"
        totalEvents:
          type: integer

    PlaceOrderBody:
      type: object
      properties:
        vendorId:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: integer
        deliveryAddress:
          type: string
        paymentMethod:
          type: string
        couponCode:
          type: string
        customerNote:
          type: string
      required:
        - vendorId
        - items
        - deliveryAddress
        - paymentMethod

    ToggleVendorStatusBody:
      type: object
      properties:
        isOpen:
          type: boolean
      required:
        - isOpen

    ToggleStockBody:
      type: object
      properties:
        stockQuantity:
          type: integer

    AdvanceOrderBody:
      type: object
      properties:
        newStatus:
          type: string
      required:
        - newStatus

    UpdateRiderStatusBody:
      type: object
      properties:
        isOnline:
          type: boolean
      required:
        - isOnline

    SearchResults:
      type: object
      properties:
        vendors:
          type: array
          items:
            $ref: "#/components/schemas/Vendor"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
