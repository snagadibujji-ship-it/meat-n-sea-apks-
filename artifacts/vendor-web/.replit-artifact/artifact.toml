kind = "web"
previewPath = "/vendor-ui/"
title = "Meat n Sea — Vendor Portal"
version = "1.0.0"
id = "artifacts/vendor-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/vendor-ui/" ]
localPort = 20717

[services.development]
run = "sh -c 'cd /home/runner/workspace/artifacts/vendor-web && BASE_PATH=/vendor-ui/ exec ./node_modules/.bin/vite --config vite.config.ts --host 0.0.0.0'"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vendor-web", "run", "build" ]
publicDir = "artifacts/vendor-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
BASE_PATH = "/vendor-ui/"
