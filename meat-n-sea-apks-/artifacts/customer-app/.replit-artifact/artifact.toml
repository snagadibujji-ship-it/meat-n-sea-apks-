kind = "mobile"
previewPath = "/customer-app/"
title = "Meat N Sea — Customer App"
version = "1.0.0"
id = "artifacts/customer-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/customer-app/" ]
localPort = 18249

[services.development]
run = "pnpm --filter @workspace/customer-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/customer-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/customer-app", "run", "serve" ]

[services.env]
PORT = "18249"
BASE_PATH = "/customer-app/"
