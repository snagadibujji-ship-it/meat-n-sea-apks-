kind = "web"
previewPath = "/vendor-ui/"
title = "Meat n Sea — Vendor Portal"
version = "1.0.0"
id = "artifacts/vendor-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/vendor-ui/" ]
localPort = 20717

[services.development]
run = "pnpm --filter @workspace/vendor-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vendor-web", "run", "build" ]
publicDir = "artifacts/vendor-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20717"
BASE_PATH = "/vendor-ui/"
