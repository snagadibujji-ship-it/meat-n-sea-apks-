kind = "web"
previewPath = "/rider-ui/"
title = "Meat n Sea — Rider App"
version = "1.0.0"
id = "artifacts/rider-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rider-ui/" ]
localPort = 21807

[services.development]
run = "pnpm --filter @workspace/rider-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rider-web", "run", "build" ]
publicDir = "artifacts/rider-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21807"
BASE_PATH = "/rider-ui/"
