kind = "web"
previewPath = "/"
title = "Meat N Sea — Admin & Vendor"
version = "1.0.0"
id = "artifacts/admin-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin-ui/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/admin-web run dev"

[services.env]
PORT = "5000"
BASE_PATH = "/admin-ui/"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-web", "run", "build" ]
publicDir = "artifacts/admin-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
